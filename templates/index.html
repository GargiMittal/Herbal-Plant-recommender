<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herbal Plant Recommendations</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- NAV -->
  <nav class="nav-bar">
    <a class="nav-logo" href="/">Botanica <span>Indica</span></a>
    <a class="nav-classic-btn" href="/classic">Classic UI</a>
  </nav>

  <div class="page-wrapper">

    <!-- HERO -->
    <div class="hero-headline animate-in">
      <span class="hero-eyebrow">✦ Herbal Intelligence</span>
      <h1 class="hero-title">Discover Plants <em>Native</em><br>to Your Soil</h1>
      <p class="hero-subtitle">Select your region or soil composition to receive curated herbal recommendations</p>
    </div>

    <div class="gold-divider animate-in animate-in-delay-1">
      <span class="gold-divider-icon">❧</span>
    </div>

    <!-- FORM -->
    <div class="form-card animate-in animate-in-delay-2">
      <form action="/recommend" method="POST">
        <div class="form-grid">

          <div class="form-field">
            <label class="form-label" for="state">Select State</label>
            <select class="form-select" name="state" id="state">
              <option value="">— Choose a state —</option>
              {% for state in states %}
                <option value="{{ state }}">{{ state }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="or-separator">or</div>

          <div class="form-field">
            <label class="form-label" for="soil_type">Select Soil Type</label>
            <select class="form-select" name="soil_type" id="soil_type">
              <option value="">— Choose a soil —</option>
              {% for soil in soils %}
                <option value="{{ soil }}">{{ soil }}</option>
              {% endfor %}
            </select>
          </div>

        </div>

        <div class="form-footer">
          <button type="submit" class="btn-submit">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 8h9M7 4l5 4-5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Get Recommendations
          </button>
        </div>
      </form>
    </div>

  </div>
</body>
</html>
